name: Build Dependencies

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: native
          - os: macos-latest
            toolchain: native
          - os: windows-latest
            toolchain: msvc
          - os: windows-latest
            toolchain: mingw
        build_type:
          - Debug
          - Release

    runs-on: ${{ matrix.os }}

    env:
      BUILD_TYPE: ${{ matrix.build_type }}
      INSTALL_DIR: ${{ github.workspace }}/deps-install-${{ matrix.toolchain }}
      PACKAGE_DIR: ${{ github.workspace }}/package-${{ matrix.toolchain }}

      ASSIMP_VERSION: v6.0.5
      FREETYPE_VERSION: VER-2-14-3
      SDL3_VERSION: release-3.4.8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            ninja-build \
            cmake \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxtst-dev \
            libxss-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libasound2-dev \
            libpulse-dev \
            libgl1-mesa-dev

      - name: Setup MSVC
        if: runner.os == 'Windows' && matrix.toolchain == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup MSYS2 for MinGW
        if: runner.os == 'Windows' && matrix.toolchain == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja mingw-w64-x86_64-binutils
          msys2-path-type: inherit

      - name: Publish MinGW path
        if: runner.os == 'Windows' && matrix.toolchain == 'mingw'
        run: |
          echo "PATH=C:\\msys64\\mingw64\\bin;$PATH" >> $GITHUB_ENV
          echo "CMAKE_PROGRAM_PATH=/c/msys64/mingw64/bin" >> $GITHUB_ENV

      - name: Create directories
        shell: bash
        run: |
          mkdir -p build
          mkdir -p "$INSTALL_DIR"
          mkdir -p "$PACKAGE_DIR"

      - name: Clone assimp
        shell: bash
        run: |
          git clone \
            --branch "$ASSIMP_VERSION" \
            --recursive \
            https://github.com/assimp/assimp.git

      - name: Build assimp
        shell: bash
        run: |
          export PATH="/c/msys64/mingw64/bin:$PATH"
          PATH=${PATH//C:\\Strawberry\\c\\bin/}
          PATH=${PATH//C:\/Strawberry\/c\/bin/}
          PATH=${PATH//\/c\/Strawberry\/c\/bin/}
          PATH=${PATH//;;/;}
          PATH=${PATH//::/:}
          PATH=${PATH#;}
          PATH=${PATH%;}
          export PATH
          export CC=/c/msys64/mingw64/bin/x86_64-w64-mingw32-gcc.exe
          export CXX=/c/msys64/mingw64/bin/x86_64-w64-mingw32-g++.exe
          cmake_args=(
            -S assimp -B build/assimp
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE"
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR"
            -DCMAKE_INSTALL_LIBDIR=lib
            -DASSIMP_BUILD_TESTS=OFF
            -DASSIMP_BUILD_ASSIMP_TOOLS=OFF
            -DBUILD_SHARED_LIBS=ON
          )

          if [ "$RUNNER_OS" = "Windows" ] && [ "${{ matrix.toolchain }}" = "mingw" ]; then
            export CCACHE_DISABLE=1
            cmake \
              -S assimp -B build/assimp \
              -G Ninja \
              -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
              -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DASSIMP_BUILD_TESTS=OFF \
              -DASSIMP_BUILD_ASSIMP_TOOLS=OFF \
              -DBUILD_SHARED_LIBS=ON \
              -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc.exe \
              -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++.exe \
              -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres.exe \
              -DCMAKE_C_COMPILER_LAUNCHER= \
              -DCMAKE_CXX_COMPILER_LAUNCHER= \
              -DCMAKE_RC_COMPILER_LAUNCHER=
          else
            cmake \
              -S assimp -B build/assimp \
              -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
              -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DASSIMP_BUILD_TESTS=OFF \
              -DASSIMP_BUILD_ASSIMP_TOOLS=OFF \
              -DBUILD_SHARED_LIBS=ON
          fi
          cmake --build build/assimp --config "$BUILD_TYPE" --parallel 2
          cmake --install build/assimp --config "$BUILD_TYPE"

      - name: Clone freetype
        shell: bash
        run: |
          git clone \
            --branch "$FREETYPE_VERSION" \
            --recursive \
            https://github.com/freetype/freetype.git

      - name: Build freetype
        shell: bash
        run: |
          export PATH="/c/msys64/mingw64/bin:$PATH"
          PATH=${PATH//C:\\Strawberry\\c\\bin/}
          PATH=${PATH//C:\/Strawberry\/c\/bin/}
          PATH=${PATH//\/c\/Strawberry\/c\/bin/}
          PATH=${PATH//;;/;}
          PATH=${PATH//::/:}
          PATH=${PATH#;}
          PATH=${PATH%;}
          export PATH
          export CC=/c/msys64/mingw64/bin/x86_64-w64-mingw32-gcc.exe
          export CXX=/c/msys64/mingw64/bin/x86_64-w64-mingw32-g++.exe
          cmake_args=(
            -S freetype -B build/freetype
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE"
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR"
            -DCMAKE_INSTALL_LIBDIR=lib
            -DBUILD_SHARED_LIBS=ON
          )

          if [ "$RUNNER_OS" = "Windows" ] && [ "${{ matrix.toolchain }}" = "mingw" ]; then
            export CCACHE_DISABLE=1
            cmake \
              -S freetype -B build/freetype \
              -G Ninja \
              -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
              -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DBUILD_SHARED_LIBS=ON \
              -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc.exe \
              -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++.exe \
              -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres.exe \
              -DCMAKE_C_COMPILER_LAUNCHER= \
              -DCMAKE_CXX_COMPILER_LAUNCHER= \
              -DCMAKE_RC_COMPILER_LAUNCHER=
          else
            cmake \
              -S freetype -B build/freetype \
              -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
              -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DBUILD_SHARED_LIBS=ON
          fi
          cmake --build build/freetype --config "$BUILD_TYPE" --parallel
          cmake --install build/freetype --config "$BUILD_TYPE"

      - name: Clone SDL3
        shell: bash
        run: |
          git clone \
            --branch "$SDL3_VERSION" \
            --recursive \
            https://github.com/libsdl-org/SDL.git SDL3

      - name: Build SDL3
        shell: bash
        run: |
          export PATH="/c/msys64/mingw64/bin:$PATH"
          PATH=${PATH//C:\\Strawberry\\c\\bin/}
          PATH=${PATH//C:\/Strawberry\/c\/bin/}
          PATH=${PATH//\/c\/Strawberry\/c\/bin/}
          PATH=${PATH//;;/;}
          PATH=${PATH//::/:}
          PATH=${PATH#;}
          PATH=${PATH%;}
          export PATH
          export CC=/c/msys64/mingw64/bin/x86_64-w64-mingw32-gcc.exe
          export CXX=/c/msys64/mingw64/bin/x86_64-w64-mingw32-g++.exe
          cmake_args=(
            -S SDL3 -B build/SDL3
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE"
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR"
            -DSDL_SHARED=ON
            -DSDL_STATIC=ON
          )

          if [ "$RUNNER_OS" = "Windows" ] && [ "${{ matrix.toolchain }}" = "mingw" ]; then
            export CCACHE_DISABLE=1
            cmake \
              -S SDL3 -B build/SDL3 \
              -G Ninja \
              -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
              -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
              -DSDL_SHARED=ON \
              -DSDL_STATIC=ON \
              -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc.exe \
              -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++.exe \
              -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres.exe \
              -DCMAKE_C_COMPILER_LAUNCHER= \
              -DCMAKE_CXX_COMPILER_LAUNCHER= \
              -DCMAKE_RC_COMPILER_LAUNCHER=
          else
            cmake \
              -S SDL3 -B build/SDL3 \
              -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
              -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
              -DSDL_SHARED=ON \
              -DSDL_STATIC=ON
          fi
          cmake --build build/SDL3 --config "$BUILD_TYPE" --parallel
          cmake --install build/SDL3 --config "$BUILD_TYPE"

      - name: Prepare package
        shell: bash
        run: |
          mkdir -p "$PACKAGE_DIR/include"
          mkdir -p "$PACKAGE_DIR/lib"

          if [ -d "$INSTALL_DIR/include" ]; then
            cp -r "$INSTALL_DIR/include/." "$PACKAGE_DIR/include/"
          fi

          find "$INSTALL_DIR" -type f \( \
            -name "*.lib" -o \
            -name "*.a" -o \
            -name "*.so" -o \
            -name "*.so.*" -o \
            -name "*.dylib" \) \
            -exec cp -P {} "$PACKAGE_DIR/lib/" \;

          if [ "$RUNNER_OS" = "Windows" ]; then
            mkdir -p "$PACKAGE_DIR/bin"
            find "$INSTALL_DIR" -type f -name "*.dll" \
              -exec cp {} "$PACKAGE_DIR/bin/" \;
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependencies-${{ runner.os }}-${{ matrix.toolchain }}-${{ matrix.build_type }}
          path: ${{ env.PACKAGE_DIR }}
