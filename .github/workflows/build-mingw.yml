name: Build Dependencies (MinGW)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-mingw:
    strategy:
      fail-fast: false
      matrix:
        build_type:
          - Debug
          - Release

    runs-on: windows-latest

    env:
      BUILD_TYPE: ${{ matrix.build_type }}
      INSTALL_DIR: ${{ github.workspace }}/deps-install

      ASSIMP_VERSION: v6.0.5
      FREETYPE_VERSION: VER-2-14-3
      SDL3_VERSION: release-3.4.8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MinGW
        run: |
          choco install mingw --version=14.2.0 -y

      - name: Create directories
        shell: bash
        run: |
          mkdir -p build
          mkdir -p $INSTALL_DIR

      - name: Clone assimp
        shell: bash
        run: |
          git clone \
            --branch $ASSIMP_VERSION \
            --recursive \
            https://github.com/assimp/assimp.git

      - name: Build assimp
        shell: bash
        run: |
          cmake -S assimp -B build/assimp \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_DIR \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DASSIMP_BUILD_TESTS=OFF \
            -DASSIMP_BUILD_ASSIMP_TOOLS=OFF \
            -DBUILD_SHARED_LIBS=ON

          cmake --build build/assimp --config $BUILD_TYPE --parallel 2
          cmake --install build/assimp --config $BUILD_TYPE

      - name: Clone freetype
        shell: bash
        run: |
          git clone \
            --branch $FREETYPE_VERSION \
            --recursive \
            https://github.com/freetype/freetype.git

      - name: Build freetype
        shell: bash
        run: |
          cmake -S freetype -B build/freetype \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_DIR \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DBUILD_SHARED_LIBS=ON

          cmake --build build/freetype --config $BUILD_TYPE --parallel
          cmake --install build/freetype --config $BUILD_TYPE

      - name: Clone SDL3
        shell: bash
        run: |
          git clone \
            --branch $SDL3_VERSION \
            --recursive \
            https://github.com/libsdl-org/SDL.git SDL3

      - name: Build SDL3
        shell: bash
        run: |
          cmake -S SDL3 -B build/SDL3 \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_INSTALL_PREFIX=$INSTALL_DIR \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=ON

          cmake --build build/SDL3 --config $BUILD_TYPE --parallel
          cmake --install build/SDL3 --config $BUILD_TYPE

      - name: Prepare package
        shell: bash
        run: |
          mkdir -p package/include
          mkdir -p package/lib
          mkdir -p package/bin

          if [ -d "$INSTALL_DIR/include" ]; then
            cp -r "$INSTALL_DIR/include/." package/include/
          fi

          find "$INSTALL_DIR" -type f \( \
            -name "*.lib" -o \
            -name "*.a"   -o \
            -name "*.so"  -o \
            -name "*.so.*" -o \
            -name "*.dylib" -o \
            -name "*.dll" \) \
            -exec cp -P {} package/lib/ \;

          find "$INSTALL_DIR" -type f -name "*.dll" \
            -exec cp {} package/bin/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependencies-Windows-MinGW-${{ matrix.build_type }}
          path: package
